<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVault - Student Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Core CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-bg" style="background-color: var(--color-bg); padding-top: 80px;">

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-grow-1 d-flex justify-content-center align-items-center py-5">
        <div class="container d-flex justify-content-center">
            <div class="w-100" style="max-width: 450px;">
                <div class="card p-4 p-md-5 border" style="border-radius: var(--radius-md); border-color: var(--color-border) !important; background: var(--color-surface); box-shadow: 0 10px 25px rgba(0,0,0,0.03);">
                    
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-dark mb-2" style="font-family: Playfair Display;">Student Login</h2>
                        <p class="text-secondary mb-0">Welcome back to OmniVault</p>
                    </div>

                    <form id="studentLoginForm">
                        <div class="mb-4">
                            <label for="studentEmail" class="form-label fw-semibold text-dark small">Email Address</label>
                            <input type="email" class="form-control py-2" id="studentEmail" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="studentPassword" class="form-label fw-semibold text-dark small">Password</label>
                            <input type="password" class="form-control py-2" id="studentPassword" required>
                        </div>

                        <button type="submit" id="loginBtn" class="btn btn-primary-custom w-100 py-2 fw-semibold mt-2">Sign In</button>
                    </form>

                    <div class="text-center mt-4 pt-3 border-top border-light">
                        <p class="text-secondary small mb-0">Don't have an account? <a href="./register.html" class="text-decoration-none fw-semibold border-bottom border-primary pb-1" style="color: var(--color-primary);">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Core JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    
    <!-- Application Scripts -->
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/navbar-loader.js"></script>
    <script src="../js/footer-loader.js"></script>
</body>
</html>
