<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVault - Contact</title>
    <link rel="icon" type="image/png" href="../Images/logo.png">
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Core CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .contact-info-card {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 24px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            transition: border-color 0.2s ease;
            margin-bottom: 16px;
        }

        .contact-info-card:hover {
            border-color: var(--color-accent);
        }

        .contact-icon-wrapper {
            background-color: var(--color-accent-light);
            color: var(--color-accent);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
        }
    </style>
	<link rel='icon' type='image/png' href='../Images/favicon.png'>
</head>

<body class="d-flex flex-column min-vh-100 bg-surface">

    <!-- ========== NAVBAR ========== -->
    <div id="navbar-placeholder"></div>
    <main class="flex-shrink-0 pt-5 mt-4">

        <!-- SECTION 1 — PAGE HEADER -->
        <section class="py-5" style="background-color: var(--color-accent-light);">
            <div class="container py-4 text-center">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center mb-3">
                        <li class="breadcrumb-item"><a href="../index.html"
                                class="text-secondary text-decoration-none hover-primary">Home</a></li>
                        <li class="breadcrumb-item active text-dark fw-medium" aria-current="page">Contact</li>
                    </ol>
                </nav>
                <h1 class="display-4 fw-bold mb-3 text-dark" style="font-family: Playfair Display;">Get in Touch</h1>
                <p class="fs-5 text-secondary">We're here to help you chart your academic journey.</p>
            </div>
        </section>

        <!-- SECTION 2 — 2-COLUMN LAYOUT -->
        <section class="py-5" style="background-color: var(--color-bg);">
            <div class="container my-4">
                <div class="row g-5">

                    <!-- LEFT — CONTACT FORM: 60% -->
                    <div class="col-lg-7 pe-lg-5">
                        <h3 class="fw-bold mb-4 font-playfair text-dark" style="font-family: Playfair Display;">Send us
                            a Message</h3>

                        <div id="form-alert"></div>

                        <form id="contact-form" class="bg-surface p-4 p-md-5 border"
                            style="border-radius: var(--radius-md); border-color: var(--color-border) !important;">

                            <div class="mb-4">
                                <label for="contactName" class="form-label fw-semibold text-dark">Full Name <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control py-2" id="contactName"
                                    placeholder="ENTER YOUR FULL NAME">
                                <div class="invalid-feedback fw-medium" id="contactNameErr"></div>
                            </div>

                            <div class="mb-4">
                                <label for="contactEmail" class="form-label fw-semibold text-dark">Email Address <span
                                        class="text-danger">*</span></label>
                                <input type="email" class="form-control py-2" id="contactEmail"
                                    placeholder="ENTER YOUR EMAIL">
                                <div class="invalid-feedback fw-medium" id="contactEmailErr"></div>
                            </div>

                            <div class="mb-4">
                                <label for="contactSubject" class="form-label fw-semibold text-dark">Subject</label>
                                <select class="form-select py-2" id="contactSubject">
                                    <option value="General Inquiry">General Inquiry</option>
                                    <option value="Course Question">Course Question</option>
                                    <option value="Admission">Admission</option>
                                    <option value="Technical Issue">Technical Issue</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="contactMessage" class="form-label fw-semibold text-dark">Your Message <span
                                        class="text-danger">*</span></label>
                                <textarea class="form-control py-2" id="contactMessage" rows="5"
                                    placeholder="How can we help you? (Minimum 20 characters)"></textarea>
                                <div class="invalid-feedback fw-medium" id="contactMessageErr"></div>
                            </div>

                            <button type="submit" class="btn btn-primary-custom w-100 py-3 fw-bold fs-6">Send
                                Message</button>
                        </form>
                    </div>

                    <!-- RIGHT — CONTACT INFO: 40% -->
                    <div class="col-lg-5">
                        <h3 class="fw-bold mb-4 font-playfair text-dark" style="font-family: Playfair Display;">Contact
                            Info</h3>

                        <div class="d-flex flex-column gap-1 mb-4">
                            <div class="contact-info-card shadow-sm">
                                <div class="contact-icon-wrapper">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                        <circle cx="12" cy="10" r="3"></circle>
                                    </svg>
                                </div>
                                <div>
                                    <h6 class="fw-bold text-dark mb-1">Our Location</h6>
                                    <p class="text-secondary mb-0">Premier University, Hazari Lane Campus<br>Chattogram,
                                        Bangladesh</p>
                                </div>
                            </div>

                            <div class="contact-info-card shadow-sm">
                                <div class="contact-icon-wrapper">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path
                                            d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                        </path>
                                        <polyline points="22,6 12,13 2,6"></polyline>
                                    </svg>
                                </div>
                                <div>
                                    <h6 class="fw-bold text-dark mb-1">Email Support</h6>
                                    <p class="text-secondary mb-0">info@omnivault.edu</p>
                                </div>
                            </div>

                            <div class="contact-info-card shadow-sm">
                                <div class="contact-icon-wrapper">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path
                                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                                        </path>
                                    </svg>
                                </div>
                                <div>
                                    <h6 class="fw-bold text-dark mb-1">Call Us</h6>
                                    <p class="text-secondary mb-0">+880 1700-000000</p>
                                </div>
                            </div>
                        </div>

                        <!-- Map Frame -->
                        <div class="w-100 border border-light overflow-hidden shadow-sm"
                            style="border-radius: var(--radius-md); height: 280px;">
                            <iframe
                                src="https://maps.google.com/maps?q=Premier+University,+Hazari+Lane+Campus,+Chattogram,+Bangladesh&t=&z=15&ie=UTF8&iwloc=&output=embed"
                                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"
                                referrerpolicy="no-referrer-when-downgrade"></iframe>
                        </div>

                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- ========== FOOTER (NESTED PAGES) ========== -->
    <div id="footer-placeholder"></div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <!-- Core JS -->
    <script src="../js/utils.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/navbar-loader.js"></script>
    <script src="../js/footer-loader.js"></script>

</body>

</html>
