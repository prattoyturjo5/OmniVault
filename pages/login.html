<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVault - Login</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Core CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body class="d-flex flex-column min-vh-100 bg-bg"
    style="background-color: var(--color-bg); padding-top: 80px;">

    <div id="navbar-placeholder"></div>


    <!-- LOGIN CARD -->
    <div class="container flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="w-100" style="max-width: 420px; z-index: 10;">

            <div class="card p-4 p-md-5 border"
                style="border-radius: var(--radius-md); border-color: var(--color-border) !important; background: var(--color-surface); box-shadow: 0 10px 25px rgba(0,0,0,0.03);">

                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark mb-2" style="font-family: Playfair Display;">Welcome Back</h2>
                    <p class="text-secondary mb-0">Sign in to your student portal</p>
                </div>

                <form id="login-form">
                    <div class="mb-3">
                        <label for="loginEmail" class="form-label fw-semibold text-dark small">Email Address</label>
                        <input type="email" class="form-control py-2" id="loginEmail" placeholder="Enter your email">
                        <div class="invalid-feedback fw-medium" id="loginEmailErr"></div>
                    </div>

                    <div class="mb-4">
                        <label for="loginPassword" class="form-label fw-semibold text-dark small">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control py-2 border-end-0" id="loginPassword"
                                placeholder="Minimum 6 characters">
                            <button class="btn border border-start-0 text-secondary bg-white" type="button"
                                id="toggleLoginPassword">
                                <!-- Eye Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="eye-icon">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                            <div class="invalid-feedback fw-medium" id="loginPasswordErr" style="width: 100%;"></div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-secondary small" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="text-accent small text-decoration-none fw-semibold hover-primary">Forgot
                            Password?</a>
                    </div>

                    <button type="submit"
                        class="btn btn-primary-custom w-100 py-2 fw-semibold fs-6 border-0 text-white shadow-sm">Login</button>
                </form>

            </div>

            <div class="text-center mt-3 text-secondary small">
                Don't have an account? <a href="./register.html"
                    class="fw-semibold text-accent text-decoration-none hover-primary">Register →</a>
            </div>

        </div>
    </div>

    <div id="footer-placeholder"></div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core JS -->
    <script src="../js/utils.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/navbar-loader.js"></script>
    <script src="../js/footer-loader.js"></script>

</body>

</html>
