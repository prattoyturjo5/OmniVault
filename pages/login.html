<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVault - Student Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .login-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--color-dark);
            margin-bottom: 30px;
            text-align: center;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .btn-primary-custom {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            background: var(--color-accent);
            color: white;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: var(--color-accent-dark);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="login-title">Student Login</h2>
        <form id="studentLoginForm">
            <div class="mb-3">
                <label for="studentEmail" class="form-label small fw-bold">Email Address</label>
                <input type="email" class="form-control" id="studentEmail" placeholder="student@omnivault.edu" required>
            </div>
            <div class="mb-3">
                <label for="studentPassword" class="form-label small fw-bold">Password</label>
                <input type="password" class="form-control" id="studentPassword" placeholder="••••••••" required>
            </div>
            <div id="loginError" class="alert alert-danger d-none py-2 small"></div>
            <button type="submit" id="loginBtn" class="btn btn-primary-custom">Sign In</button>
        </form>
        <a href="../index.html" class="back-link">← Back to Home</a>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <!-- Core JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
