<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVault - Blog</title>
    <link rel="icon" type="image/png" href="../Images/logo.png">
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Core CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .blog-filter {
            color: var(--color-text-secondary);
            border-radius: 20px;
            padding: 8px 20px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--color-border);
            background-color: var(--color-surface);
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .blog-filter:hover {
            color: var(--color-accent);
            border-color: var(--color-accent);
        }

        .blog-filter.active {
            color: white;
            background-color: var(--color-accent);
            border-color: var(--color-accent);
        }
    </style>
	<link rel='icon' type='image/png' href='../Images/favicon.png'>
</head>

<body class="d-flex flex-column min-vh-100 bg-surface">

    <div id="navbar-placeholder"></div>

    <main class="flex-shrink-0 pt-5 mt-4" id="blog-page-container">

        <!-- SECTION 1 — IMAGE BANNER -->
        <section class="w-100" style="height: 250px; background: url('https://admin.puc.ac.bd/Images/Slider/SliderImage/162e65de-f484-4c11-aea8-0b58df862759_SliderImage_CSE_1.jpg') center/cover no-repeat; border-bottom: 3px solid var(--color-accent);">
        </section>

        <!-- SECTION 1.5 — TITLE PANEL -->
        <section style="background-color: #F7F8F0; padding: 48px 0; border-bottom: 1px solid var(--color-border);">
            <div class="container text-center">
                <h1 class="display-4 fw-bold mb-3" style="font-family: Playfair Display; color: #355872;">Insights and updates on Student Resources</h1>
                <p class="fs-5 mx-auto mb-0" style="max-width: 800px; color: #355872; opacity: 0.9; line-height: 1.6;">Insights, university culture, and academic breakthroughs from the heart of OmniVault.</p>
            </div>
        </section>

        <!-- SECTION 2 — FEATURED POST -->
        <section class="py-5"
            style="background-color: var(--color-surface); border-bottom: 1px solid var(--color-border);">
            <div class="container my-2" id="featured-post">
                <div class="row g-4 align-items-center border"
                    style="border-radius: var(--radius-md); overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                    <div class="col-lg-6 p-5">
                        <div class="mb-3">
                            <span class="badge bg-light text-dark py-2 px-3 border border-secondary fw-semibold"
                                id="featured-category">...</span>
                        </div>
                        <h2 class="display-6 fw-bold mb-3 text-dark" id="featured-title"
                            style="font-family: Playfair Display;">Loading Featured Post...</h2>
                        <p class="text-secondary mb-4 fs-5 w-75" id="featured-excerpt" style="line-height: 1.6;"></p>
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                            <div class="small text-secondary fw-semibold" id="featured-meta"></div>
                            <a href="#"
                                class="fw-bold text-accent text-decoration-none border-bottom border-accent pb-1 d-inline-block hover-primary"
                                id="featured-link">Read Full Post →</a>
                        </div>
                    </div>
                    <div class="col-lg-6 p-0">
                        <!-- Colored div acts as placeholder aspect 16:9 equivalent -->
                        <div class="w-100 h-100 d-flex flex-column align-items-center justify-content-center"
                            style="background-color: var(--color-bg); min-height: 400px; border-left: 1px solid var(--color-border);">
                            <div class="spinner-border text-accent mb-3" role="status"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECTION 3 — CATEGORY PILLS + POSTS GRID -->
        <section class="py-5" style="background-color: #F7F8F0;">
            <div class="container my-3">
                <div class="d-flex flex-wrap gap-2 mb-5" id="blogTypes">
                    <a class="blog-filter active" data-filter="All">All Topics</a>
                    <a class="blog-filter" data-filter="Advice">Advice</a>
                    <a class="blog-filter" data-filter="Research">Research</a>
                    <a class="blog-filter" data-filter="Campus Life">Campus Life</a>
                    <a class="blog-filter" data-filter="Announcements">Announcements</a>
                </div>

                <div class="row g-4" id="blog-grid">

                </div>
            </div>
        </section>

    </main>

    <!-- ========== FOOTER (NESTED PAGES) ========== -->
    <div id="footer-placeholder"></div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <!-- Core JS -->
    <script src="../js/utils.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/blog.js"></script>
    <script src="../js/navbar-loader.js"></script>
    <script src="../js/footer-loader.js"></script>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <!-- Core JS -->
    <script src="../js/utils.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/blog.js"></script>
    <script src="../js/navbar-loader.js"></script>
</body>

</html>
