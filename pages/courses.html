<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVault - All Courses</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Core CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <!-- Page Specific CSS -->
    <link rel="stylesheet" href="../css/pages/courses.css">
    <style>
        .filter-sidebar {
            width: 260px;
            flex-shrink: 0;
            background-color: var(--color-surface);
            border-right: 1px solid var(--color-border);
            padding: 32px 24px;
            height: 100%;
        }

        @media (max-width: 991.98px) {
            .filter-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--color-border);
                padding: 24px 16px;
            }
        }

        .filter-group-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: var(--color-text-secondary);
            margin-bottom: 12px;
        }

        .filter-check .form-check-input:checked {
            background-color: var(--color-accent);
            border-color: var(--color-accent);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100 bg-surface">

    <div id="navbar-placeholder"></div>

    <main class="flex-shrink-0 pt-5 mt-4" id="courses-page-container">

        <!-- SECTION 1 — PAGE HEADER -->
        <section style="background-color: var(--color-accent-light); padding: 48px 0;">
            <div class="container">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-3">
                        <li class="breadcrumb-item"><a href="../index.html"
                                class="text-secondary text-decoration-none hover-primary">Home</a></li>
                        <li class="breadcrumb-item active text-dark fw-medium" aria-current="page">Courses</li>
                    </ol>
                </nav>
                <h1 class="display-5 fw-bold mb-4 text-dark" style="font-family: Playfair Display;">Our Courses</h1>

                <div class="input-group shadow-sm" style="max-width: 600px;">
                    <input type="text" class="form-control form-control-lg border-0 bg-surface px-4 shadow-none"
                        id="catalog-search" placeholder="Search by title or instructor...">
                    <span class="input-group-text bg-surface border-0 pe-4 text-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </span>
                </div>
            </div>
        </section>

        <!-- SECTION 2 — FILTER + GRID LAYOUT -->
        <section style="background-color: var(--color-bg);">
            <div class="container-fluid px-0">
                <div class="d-flex flex-column flex-lg-row">

                    <!-- SIDEBAR: Fixed Width -->
                    <aside class="filter-sidebar z-1">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="mb-0 fw-bold">Filter Courses</h5>
                        </div>

                        <!-- Department Checkboxes -->
                        <div class="mb-4">
                            <div class="filter-group-title">SPECIALIZATION</div>
                            <div class="form-check filter-check mb-2">
                                <input class="form-check-input dept-checkbox" type="checkbox" value="CS" id="deptCS">
                                <label class="form-check-label text-dark small fw-medium" for="deptCS">Computer
                                    Science</label>
                            </div>
                        </div>

                        <hr class="border-light my-4">

                        <!-- Level Radio Buttons -->
                        <div class="mb-4">
                            <div class="filter-group-title">LEVEL</div>
                            <div class="form-check filter-check mb-2">
                                <input class="form-check-input" type="radio" name="levelRadio" id="level-all"
                                    value="All" checked>
                                <label class="form-check-label text-dark small fw-medium" for="level-all">All</label>
                            </div>
                            <div class="form-check filter-check mb-2">
                                <input class="form-check-input" type="radio" name="levelRadio" id="level-ug"
                                    value="Undergraduate">
                                <label class="form-check-label text-dark small fw-medium"
                                    for="level-ug">Undergraduate</label>
                            </div>
                            <div class="form-check filter-check mb-2">
                                <input class="form-check-input" type="radio" name="levelRadio" id="level-pg"
                                    value="Postgraduate">
                                <label class="form-check-label text-dark small fw-medium"
                                    for="level-pg">Postgraduate</label>
                            </div>
                        </div>

                        <hr class="border-light my-4">

                        <!-- Duration Select Dropdown -->
                        <div class="mb-4">
                            <div class="filter-group-title">DURATION</div>
                            <select class="form-select form-select-sm shadow-none border bg-white" id="durationSelect">
                                <option value="Any">Any Duration</option>
                                <option value="Under 8">Under 8 Weeks</option>
                                <option value="8-16">8–16 Weeks</option>
                                <option value="16+">16+ Weeks</option>
                            </select>
                        </div>

                        <hr class="border-light my-4">

                        <a href="#" id="reset-filters"
                            class="text-accent hover-primary text-decoration-none fw-semibold small">Reset Filters</a>

                    </aside>

                    <!-- GRID AREA -->
                    <div class="flex-grow-1 p-4 py-5" style="max-width: 1400px; margin: 0 auto; width: 100%;">

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <p id="count-display" class="fw-semibold text-secondary mb-0">Showing 12 of 12 courses</p>
                        </div>

                        <div class="row g-4" id="courses-grid">
                            <!-- Cards will be rendered here dynamically via JS extension -->
                        </div>

                    </div>

                </div>
            </div>
        </section>

    </main>

    <!-- ========== FOOTER (NESTED PAGES) ========== -->
    <div id="footer-placeholder"></div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core JS -->
    <script src="../js/utils.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/courses.js"></script>
    <script src="../js/navbar-loader.js"></script>
    <script src="../js/footer-loader.js"></script>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core JS -->
    <script src="../js/utils.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/courses.js"></script>
    <script src="../js/navbar-loader.js"></script>
</body>

</html>
