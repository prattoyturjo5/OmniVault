<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVault - Article</title>
    <link rel="icon" type="image/png" href="../Images/logo.png">
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Core CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel='icon' type='image/png' href='../Images/favicon.png'>
</head>

<body class="d-flex flex-column min-vh-100 bg-surface">

    <div id="navbar-placeholder"></div>
    <style>
        body.menu-open .mobile-menu-overlay {
            display: block !important;
        }

        body.menu-open {
            overflow: hidden;
        }
    </style>

    <main class="flex-shrink-0 pt-5 mt-4" id="blog-detail-container">

        <div class="container py-5 text-center" id="detail-loading">
            <div class="spinner-border text-accent mb-3" role="status"></div>
        </div>

        <!-- Hidden until hydrated -->
        <div id="detail-content-wrapper" class="d-none">

            <!-- SECTION 2 — BREADCRUMB -->
            <section class="border-bottom border-light" style="background-color: var(--color-bg);">
                <div class="container py-3">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="../index.html"
                                    class="text-secondary text-decoration-none hover-primary">Home</a></li>
                            <li class="breadcrumb-item"><a href="./blog.html"
                                    class="text-secondary text-decoration-none hover-primary">Blog</a></li>
                            <li class="breadcrumb-item active text-dark fw-semibold" id="breadcrumb-title"
                                aria-current="page">Loading</li>
                        </ol>
                    </nav>
                </div>
            </section>

            <!-- SECTION 3 — POST CONTENT AREA (70/30) -->
            <section class="py-5" style="background-color: var(--color-surface);">
                <div class="container my-3">
                    <div class="row g-5">

                        <!-- MAIN CONTENT: 70% -->
                        <div class="col-lg-8 pe-lg-5">

                            <div class="mb-4">
                                <span class="badge bg-white text-dark py-2 px-3 border border-secondary fw-semibold"
                                    id="detail-category">...</span>
                            </div>

                            <h1 class="display-5 fw-bold mb-3 text-dark" id="detail-title"
                                style="font-family: Playfair Display;">...</h1>

                            <p class="text-secondary fw-medium mb-4 fs-5" id="detail-meta">...</p>

                            <hr class="border-light mb-5">

                            <!-- Auto-generated paragraphs dump here -->
                            <div id="detail-content" class="mb-5"></div>

                            <a href="./blog.html" class="btn btn-outline-secondary px-4 py-2 fw-semibold">← Back to
                                Blog</a>

                        </div>

                        <!-- SIDEBAR: 30% -->
                        <div class="col-lg-4">
                            <div class="sticky-top" style="top: 100px;">

                                <!-- Latest Post widget -->
                                <div class="card p-4 shadow-none border border-light mb-4"
                                    style="border-radius: var(--radius-md); background: var(--color-bg);">
                                    <h5 class="fw-bold mb-4 text-dark align-items-center d-flex gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round" class="text-accent">
                                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                                        </svg>
                                        Latest Posts
                                    </h5>
                                    <div id="sidebar-latest">
                                        <!-- Injected -->
                                    </div>
                                </div>

                                <!-- Categories Widget -->
                                <div class="card p-4 shadow-none border border-light"
                                    style="border-radius: var(--radius-md); background: var(--color-bg);">
                                    <h5 class="fw-bold mb-4 text-dark align-items-center d-flex gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round" class="text-accent">
                                            <line x1="8" y1="6" x2="21" y2="6"></line>
                                            <line x1="8" y1="12" x2="21" y2="12"></line>
                                            <line x1="8" y1="18" x2="21" y2="18"></line>
                                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                                        </svg>
                                        Categories
                                    </h5>
                                    <div id="sidebar-categories" class="d-flex flex-column gap-1">
                                        <!-- Injected Counts -->
                                    </div>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            </section>

        </div>
    </main>

    <!-- ========== FOOTER (NESTED PAGES) ========== -->
    <div id="footer-placeholder"></div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <!-- Core JS -->
    <script src="../js/utils.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/blog.js"></script>
    <script src="../js/navbar-loader.js"></script>
    <script src="../js/footer-loader.js"></script>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <!-- Core JS -->
    <script src="../js/utils.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/blog.js"></script>
</body>

</html>
