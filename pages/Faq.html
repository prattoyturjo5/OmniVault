<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVault - FAQ</title>
    <link rel="icon" type="image/png" href="../Images/logo.png">
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Core CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .accordion-omnivault .accordion-item {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md) !important;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .accordion-omnivault .accordion-button {
            font-weight: 600;
            padding: 24px;
        }

        .search-bar-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-bar-wrapper svg {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-secondary);
        }

        .search-bar-wrapper input {
            padding-left: 54px;
            height: 60px;
            border-radius: var(--radius-md);
        }
    </style>
    <link rel='icon' type='image/png' href='../Images/favicon.png'>
</head>

<body class="d-flex flex-column min-vh-100 bg-surface">

    <div id="navbar-placeholder"></div>

    <main class="flex-shrink-0 pt-5 mt-4">

        <!-- SECTION 1 — PAGE HEADER -->
        <section style="background-color: var(--color-accent-light); padding: 48px 0;">
            <div class="container text-center">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center mb-3">
                        <li class="breadcrumb-item"><a href="../index.html"
                                class="text-secondary text-decoration-none">Home</a></li>
                        <li class="breadcrumb-item active text-dark fw-medium" aria-current="page">FAQ</li>
                    </ol>
                </nav>
                <h1 class="display-4 fw-bold mb-3 text-dark" style="font-family: Playfair Display;">Frequently Asked
                    Questions</h1>
                <p class="fs-5 text-secondary">Find answers to your questions about admissions, courses, and campus
                    life.</p>
            </div>
        </section>

        <!-- SECTION 2 — SEARCH -->
        <section class="py-5" style="background-color: var(--color-bg); border-bottom: 1px solid var(--color-border);">
            <div class="container">
                <div class="search-bar-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" class="form-control" id="faq-search" placeholder="Search questions...">
                </div>
            </div>
        </section>

        <!-- SECTION 3 — FAQ -->
        <section class="py-5" style="background-color: var(--color-bg);">
            <div class="container" style="max-width: 800px;">
                <div id="faq-empty-state" class="d-none text-center py-5">
                    <h4 class="fw-bold mb-3">No results found.</h4>
                </div>
                <div class="accordion accordion-omnivault" id="faq-accordion">
                    <!-- Admissions -->
                    <div class="faq-group">
                        <h4 class="fw-bold mb-4 mt-4 text-dark" style="font-family: Playfair Display;">Admissions</h4>
                        <div class="accordion-item faq-item">
                            <h2 class="accordion-header"><button class="accordion-button" type="button"
                                    data-bs-toggle="collapse" data-bs-target="#c1"><span class="faq-question-text">What
                                        are the admission requirements?</span></button></h2>
                            <div id="c1" class="accordion-collapse collapse show" data-bs-parent="#faq-accordion">
                                <div class="accordion-body">Minimum GPA 3.0, official transcripts, and letter of intent.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <div id="footer-placeholder"></div>

    <!-- Core Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/navbar-loader.js"></script>
    <script src="../js/footer-loader.js"></script>

    <script>
        $(document).ready(function () {
            $('#faq-search').on('keyup', function () {
                const query = $(this).val().toLowerCase();
                $('.faq-item').each(function () {
                    const text = $(this).find('.faq-question-text').text().toLowerCase();
                    $(this).toggle(text.indexOf(query) !== -1);
                });
            });
        });
    </script>
</body>

</html>
